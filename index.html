<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CAIXIANG666 | 联机操盘终端</title>
    <!-- ✅ 必须先加载这些库 -->
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --primary: #f1c40f; --text: #e6edf3; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .login-box { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--card); padding: 40px; border-radius: 15px; border: 1px solid var(--primary); text-align: center; }
        input { padding: 10px; margin: 10px 0; width: 200px; border-radius: 5px; border: 1px solid #334155; background: #0d1117; color: white; }
        button { cursor: pointer; padding: 10px 20px; border-radius: 5px; border: none; font-weight: bold; }
        #customAlert { position: fixed; top: 20px; right: 20px; background: var(--primary); color: black; padding: 15px; display: none; z-index: 2000; border-radius: 8px; }
    </style>
</head>
<body>

<div id="customAlert"></div>

<div id="loginBox" class="login-box">
    <div class="login-card">
        <h2 style="color:var(--primary)">🔐 系统授权</h2>
        <input type="text" id="pName" placeholder="操盘代号"><br>
        <input type="password" id="pPwd" placeholder="4位密码"><br>
        <button onclick="doLogin()" style="background:var(--primary); width: 100%;">进入系统</button>
        <p id="netStatus" style="font-size:12px; color:#8b949e; margin-top:10px">正在建立加密连接...</p>
    </div>
</div>

<div id="gameUI" style="display:none; max-width: 800px; margin: 0 auto;">
    <div style="background:#1e293b; padding:20px; border-radius:10px; display:flex; justify-content:space-between; align-items:center;">
        <h2 id="balanceDisplay" style="color:var(--primary); margin:0">资产: ¥100,000.00</h2>
        <button onclick="getNews()" style="background:#9b59b6; color:white;">获取内幕</button>
    </div>
    <div id="newsArea" style="display:none; background:#fffbe6; color:#92400e; padding:10px; margin-top:10px; border-radius:5px;">📢 <span id="newsContent"></span></div>
    
    <div id="stockGrid" style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:20px;"></div>
    
    <button onclick="simulateDay()" style="width:100%; margin-top:20px; padding:15px; background:var(--primary); font-size:18px;">⏳ 结束交易并结算</button>
</div>

<script>
    // ✅ 这里的配置一定要准确
    const firebaseConfig = {
      apiKey: "AIzaSyAOCLu6X1gbrYzHLx_HlhJrtXQ_ftSddcQ",
      authDomain: "caixiang666-stock.firebaseapp.com",
      databaseURL: "https://caixiang666-stock-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "caixiang666-stock",
      storageBucket: "caixiang666-stock.firebasestorage.app",
      appId: "1:504203288950:web:2f93e0c6a2dde37f095a57"
    };

    let db, balance = 100000, playerName = "", stocks = [], activeNews = null;

    // ✅ 自定义通知
    function toast(msg) {
        const el = document.getElementById('customAlert');
        el.innerText = msg;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 2000);
    }

    // ✅ 初始化 Firebase
    function initFirebase() {
        if (typeof firebase !== 'undefined') {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            document.getElementById('netStatus').innerText = "✅ 卫星连接就绪";
        } else {
            setTimeout(initFirebase, 500);
        }
    }
    initFirebase();

    // ✅ 核心函数：doLogin
    async function doLogin() {
        const name = document.getElementById('pName').value.trim();
        const pwd = document.getElementById('pPwd').value;
        if(!name || !pwd) { toast("请输入代号和密码"); return; }
        if(!db) { toast("卫星还没连上，请稍等"); return; }

        try {
            const snap = await db.ref('users/' + name).once('value');
            const data = snap.val();
            if (!data) {
                await db.ref('users/' + name).set({ password: pwd, balance: 100000 });
                balance = 100000;
            } else if (data.password !== pwd) {
                toast("授权密码错误！"); return;
            } else {
                balance = data.balance;
            }
            playerName = name;
            document.getElementById('loginBox').style.display='none';
            document.getElementById('gameUI').style.display='block';
            initStocks();
            toast(`欢迎回来, ${playerName}`);
        } catch (e) {
            toast("数据库连接失败");
            console.error(e);
        }
    }

    function initStocks() {
        const names = ['量子科技','基因工程','星际矿业','虚拟房产'];
        stocks = names.map(n => ({ name: n, price: Math.random()*100+50, lastPrice: 70, hold: 0 }));
        render();
    }

    function render() {
        const grid = document.getElementById('stockGrid');
        grid.innerHTML = '';
        stocks.forEach((s, i) => {
            grid.innerHTML += `
                <div style="background:var(--card); padding:15px; border-radius:10px; border:1px solid #334155">
                    <b>${s.name}</b><br>
                    <span style="font-size:20px; color:red">¥${s.price.toFixed(2)}</span><br>
                    持仓: ${s.hold}<br>
                    <button onclick="buy(${i})" style="background:rgba(255,0,0,0.1); color:red; border:1px solid red; margin-top:5px">买入</button>
                    <button onclick="
