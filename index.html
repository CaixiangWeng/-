<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CAIXIANG666 | 操盘终端</title>
    <!-- 引入 Firebase SDK (Compat 版本) -->
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --primary: #f1c40f; --text: #e6edf3; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; }
        #loginBox { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .card { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--primary); }
        input { padding: 10px; margin: 10px 0; width: 80%; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; }
        button { padding: 10px 20px; background: var(--primary); border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #customAlert { position: fixed; top: 20px; right: 20px; background: var(--primary); color: #000; padding: 15px; border-radius: 8px; display: none; z-index: 2000; }
    </style>
</head>
<body>

<div id="customAlert">通知</div>

<div id="loginBox">
    <div class="card">
        <h2>🔐 终端授权</h2>
        <input type="text" id="pName" placeholder="代号"><br>
        <input type="password" id="pPwd" placeholder="4位密码"><br>
        <!-- ✅ 确保 doLogin 在这里被调用 -->
        <button onclick="doLogin()">进入系统</button>
        <p id="netStatus" style="font-size:12px; color:#666; margin-top:10px">正在连接卫星...</p>
    </div>
</div>

<div id="gameUI" class="container" style="display:none">
    <div class="card">
        <div style="font-size:12px; color:#888">可用资产</div>
        <div id="balanceDisplay" style="font-size:30px; color:var(--primary)">¥100,000.00</div>
    </div>
    <br>
    <button onclick="simulateDay()" style="width:100%; height:60px">⏳ 结束交易并同步</button>
    <div id="rankList" style="margin-top:20px; text-align:left"></div>
</div>

<script>
    // 1. 配置信息
    const firebaseConfig = {
        apiKey: "AIzaSyAOCLu6X1gbrYzHLx_HlhJrtXQ_ftSddcQ",
        authDomain: "caixiang666-stock.firebaseapp.com",
        databaseURL: "https://caixiang666-stock-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "caixiang666-stock",
        storageBucket: "caixiang666-stock.firebasestorage.app",
        appId: "1:504203288950:web:2f93e0c6a2dde37f095a57"
    };

    let db, balance = 100000, playerName = "";

    // 2. 初始化 Firebase (防止 doLogin 找不到 db)
    function init() {
        if (typeof firebase !== 'undefined') {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            document.getElementById('netStatus').innerText = "✅ 卫星已连接";
        } else {
            setTimeout(init, 500);
        }
    }
    init();

    // 3. 定义 doLogin 函数 (显式挂载到 window 确保 onclick 能找到)
    window.doLogin = async function() {
        const name = document.getElementById('pName').value.trim();
        const pwd = document.getElementById('pPwd').value;
        if (!name || !pwd) return toast("请输入完整信息");
        if (!db) return toast("系统连接中，请稍后...");

        try {
            const snap = await db.ref('users/' + name).once('value');
            const data = snap.val();

            if (!data) {
                await db.ref('users/' + name).set({ password: pwd, balance: 100000 });
                balance = 100000;
            } else if (data.password !== pwd) {
                return toast("密码错误");
            } else {
                balance = data.balance;
            }

            playerName = name;
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('gameUI').style.display = 'block';
            updateRanks();
            toast("登录成功！");
        } catch (e) {
            toast("数据库连接失败");
        }
    };

    window.simulateDay = async function() {
        balance += (Math.random() * 2000 - 500); // 模拟资产波动
        if (db && playerName) {
            await db.ref('users/' + playerName).update({ balance: balance });
            toast("数据已同步");
        }
        document.getElementById('balanceDisplay').innerText = "¥" + balance.toLocaleString();
    };

    function toast(msg) {
        const el = document.getElementById('customAlert');
        el.innerText = msg;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 2000);
    }

    function updateRanks() {
        db.ref('users').orderByChild('balance').limitToLast(10).on('value', snap => {
            let h = "<h3>🏆 战力榜</h3>";
            snap.forEach(c => {
                h += `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #222">
                    <span>${c.key}</span><span>¥${c.val().balance.toLocaleString()}</span>
                </div>`;
            });
            document.getElementById('rankList').innerHTML = h;
        });
