<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CAIXIANG666 | 修复版终端</title>
    <!-- 引入 Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

    <script>
        // ✅ 这里的代码会在按钮点击前就准备好
        var db, balance = 100000, playerName = "";

        const firebaseConfig = {
            apiKey: "AIzaSyAOCLu6X1gbrYzHLx_HlhJrtXQ_ftSddcQ",
            authDomain: "caixiang666-stock.firebaseapp.com",
            databaseURL: "https://caixiang666-stock-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "caixiang666-stock",
            storageBucket: "caixiang666-stock.firebasestorage.app",
            appId: "1:504203288950:web:2f93e0c6a2dde37f095a57"
        };

        // 初始化
        function initApp() {
            if (typeof firebase !== 'undefined') {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                console.log("Firebase 卫星连接成功");
                if(document.getElementById('netStatus')) {
                    document.getElementById('netStatus').innerText = "✅ 卫星连接成功";
                }
            } else {
                setTimeout(initApp, 500);
            }
        }
        initApp();

        // ✅ 定义 doLogin，确保它在全局范围内可用
        window.doLogin = async function() {
            const name = document.getElementById('pName').value.trim();
            const pwd = document.getElementById('pPwd').value;
            
            if (!name || !pwd) { alert("代号和密码必填！"); return; }
            if (!db) { alert("系统连接中，请稍等..."); return; }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerText = "验证中...";

            try {
                const snap = await db.ref('users/' + name).once('value');
                const data = snap.val();

                if (!data) {
                    await db.ref('users/' + name).set({ password: pwd, balance: 100000 });
                    balance = 100000;
                } else if (data.password !== pwd) {
                    alert("密码错误！");
                    btn.disabled = false;
                    btn.innerText = "进入系统";
                    return;
                } else {
                    balance = data.balance;
                }

                playerName = name;
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('gameUI').style.display = 'block';
                document.getElementById('balanceDisplay').innerText = "¥" + balance.toLocaleString();
            } catch (e) {
                console.error(e);
                alert("连接失败，请确认 Firebase Rules 为 public");
                btn.disabled = false;
                btn.innerText = "重试";
            }
        };
    </script>

    <style>
        body { font-family: sans-serif; background: #0b0e14; color: #fff; text-align: center; padding: 50px; }
        .card { background: #161b22; padding: 30px; border-radius: 15px; border: 1px solid #f1c40f; display: inline-block; }
        input { display: block; margin: 10px auto; padding: 10px; width: 200px; border-radius: 5px; border: none; }
        button { padding: 10px 30px; background: #f1c40f; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #666; }
    </style>
</head>
<body>

<div id="loginBox">
    <div class="card">
        <h2>🚀 CAIXIANG666 登录</h2>
        <input type="text" id="pName" placeholder="交易员代号">
        <input type="password" id="pPwd" placeholder="4位密码">
        <button id="loginBtn" onclick="doLogin()">进入系统</button>
        <p id="netStatus" style="font-size:12px; color: #8b949e; margin-top:15px">卫星扫描中...</p>
    </div>
</div>

<div id="gameUI" style="display:none">
    <h1>欢迎回来</h1>
    <div class="card">
        <div style="font-size:14px; color:#8b949e">当前资产</div>
        <div id="balanceDisplay" style="font-size:40px; color:#f1c40f">¥0.00</div>
    </div>
</div>

</body>
</html>
