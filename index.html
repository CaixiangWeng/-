<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAIXIANG666 | 高级模拟交易终端</title>
    
    <!-- 核心库 -->
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #6366f1; /* 现代紫 */
            --bg: #0b0e14;
            --card: #161b22;
            --yellow: #facc15;
            --up: #22c55e; /* 国际绿：涨 */
            --down: #ef4444; /* 国际红：跌 */
            --text: #e6edf3;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 登录框美化 */
        #loginBox {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: flex; justify-content: center; align-items: center;
        }
        .login-panel {
            background: var(--card); padding: 40px; border-radius: 20px;
            border: 1px solid #30363d; width: 300px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* 主容器 */
        .app-container { width: 100%; max-width: 900px; }

        /* 资产头部卡片 */
        .stats-bar {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 25px; border-radius: 16px; border: 1px solid #30363d;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .balance-label { font-size: 14px; color: #8b949e; margin-bottom: 5px; }
        .balance-amount { font-size: 32px; font-weight: 800; color: var(--yellow); font-family: 'Courier New', monospace; }

        /* 股票网格布局 - 仿 Replit 风格 */
        .stock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-bottom: 20px; }
        
        .stock-card {
            background: var(--card); padding: 20px; border-radius: 12px;
            border: 1px solid #30363d; transition: 0.2s;
        }
        .stock-card:hover { border-color: var(--primary); transform: translateY(-2px); }

        .stock-info { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .stock-name { font-size: 18px; font-weight: bold; }
        .stock-price { font-family: monospace; font-size: 20px; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            border: none; padding: 10px; border-radius: 8px; font-weight: bold; 
            cursor: pointer; transition: 0.2s;
        }
        .btn-buy { background: rgba(34, 197, 94, 0.1); color: var(--up); border: 1px solid var(--up); }
        .btn-buy:hover { background: var(--up); color: white; }
        .btn-sell { background: rgba(239, 68, 68, 0.1); color: var(--down); border: 1px solid var(--down); }
        .btn-sell:hover { background: var(--down); color: white; }

        /* 排行榜 */
        .rank-section {
            background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #30363d;
        }
        .rank-item {
            display: flex; justify-content: space-between; padding: 12px;
            border-bottom: 1px solid #21262d;
        }
        .rank-item:last-child { border: none; }

        /* 动画闪烁 */
        @keyframes flash-up { from { background: rgba(34,197,94,0.3); } to { background: transparent; } }
        .up-anim { animation: flash-up 0.8s; }
    </style>
</head>
<body>

<div id="loginBox">
    <div class="login-panel">
        <h2 style="margin-top:0">WENG 终端</h2>
        <input type="text" id="pName" placeholder="账号" style="width:100%; padding:12px; margin-bottom:10px; background:#0d1117; border:1px solid #30363d; color:white; border-radius:8px; box-sizing:border-box">
        <input type="password" id="pPwd" placeholder="密码" style="width:100%; padding:12px; margin-bottom:20px; background:#0d1117; border:1px solid #30363d; color:white; border-radius:8px; box-sizing:border-box">
        <button onclick="doLogin()" id="loginBtn" style="width:100%; padding:15px; background:var(--primary); border:none; color:white; border-radius:8px; font-weight:bold; cursor:pointer">进入市场</button>
        <p id="netStatus" style="font-size:12px; color:#8b949e; margin-top:15px">等待连接...</p>
    </div>
</div>

<div id="gameUI" class="app-container" style="display:none">
    <div class="stats-bar">
        <div>
            <div class="balance-label">账户净资产 (CNY)</div>
            <div id="balanceDisplay" class="balance-amount">¥100,000.00</div>
        </div>
        <button onclick="getNews()" style="background:#21262d; color:white; border:1px solid #30363d; padding:10px 20px; border-radius:8px; cursor:pointer">📰 监听情报</button>
    </div>

    <div id="newsBox" style="display:none; background:rgba(99,102,241,0.1); border:1px solid var(--primary); color:var(--primary); padding:15px; border-radius:12px; margin-bottom:20px">
        ⚡ <b>市场情报:</b> <span id="newsContent"></span>
    </div>

    <div class="stock-grid" id="stockGrid"></div>

    <button onclick="simulateDay()" style="width:100%; padding:20px; background:var(--primary); color:white; border:none; border-radius:12px; font-size:18px; font-weight:bold; margin-bottom:20px; cursor:pointer">⏳ 结束交易并结算</button>

    <div class="rank-section">
        <h3 style="margin-top:0; color:var(--yellow)">🏆 全球实时富豪榜</h3>
        <div id="rankList">加载中...</div>
    </div>
</div>

<script>
    // Firebase 配置
    const firebaseConfig = {
      apiKey: "AIzaSyAOCLu6X1gbrYzHLx_HlhJrtXQ_ftSddcQ",
      authDomain: "caixiang666-stock.firebaseapp.com",
      databaseURL: "https://caixiang666-stock-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "caixiang666-stock",
      storageBucket: "caixiang666-stock.firebasestorage.app",
      appId: "1:504203288950:web:2f93e0c6a2dde37f095a57"
    };

    let db, balance = 100000, playerName = "", stocks = [], activeNews = null;

    function initFirebase() {
        if (typeof firebase !== 'undefined') {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            document.getElementById('netStatus').innerText = "✅ 连接成功";
        } else { setTimeout(initFirebase, 500); }
    }
    initFirebase();

    async function doLogin() {
        const name = document.getElementById('pName').value.trim();
        const pwd = document.getElementById('pPwd').value;
        if(!name || !pwd) return alert("请输入完整凭证");

        const btn = document.getElementById('loginBtn');
        btn.disabled = true; btn.innerText = "验证中...";

        try {
            const snap = await db.ref('users/' + name).once('value');
            const data = snap.val();
            if (!data) {
                await db.ref('users/' + name).set({ password: pwd, balance: 100000 });
                balance = 100000;
            } else if (data.password !== pwd) {
                btn.disabled = false; btn.innerText = "重试";
                return alert("密码不匹配");
            } else { balance = data.balance; }
            
            playerName = name;
            document.getElementById('loginBox').style.display='none';
            document.getElementById('gameUI').style.display='block';
            initStocks(); updateRanks();
        } catch (e) { alert("网络错误，请刷新重试"); }
    }

    function initStocks() {
        const pool = ['英伟达','特斯拉','苹果','微软','谷歌','亚马逊'];
        stocks = pool.map(n => ({
            name: n, price: Math.random()*200+100, hold: 0, cost: 0
        }));
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('stockGrid');
        grid.innerHTML = '';
        stocks.forEach((s, i) => {
            const profit = s.hold > 0 ? (s.price * s.hold - s.cost).toFixed(2) : 0;
            grid.innerHTML += `
                <div class="stock-card">
                    <div class="stock-info">
                        <span class="stock-name">${s.name}</span>
                        <span class="stock-price">¥${s.price.toFixed(2)}</span>
                    </div>
                    <div style="font-size:12px; color:#8b949e; margin-bottom:15px">
                        持仓: ${s.hold} 股 | 盈亏: <span style="color:${profit>=0? 'var(--up)':'var(--down)'}">¥${profit}</span>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-buy" onclick="trade(${i}, 10)">买入 10</button>
                        <button class="btn btn-sell" onclick="trade(${i}, -10)">卖出 10</button>
                    </div>
                </div>
            `;
        });
        document.getElementById('balanceDisplay').innerText = `¥${balance.toLocaleString(undefined,{minimumFractionDigits:2})}`;
    }

    function trade(idx, amt) {
        const s = stocks[idx];
        if (amt > 0) { // 买入
            let total = s.price * amt;
            if (balance >= total) {
                balance -= total;
                s.hold += amt;
                s.cost += total;
            } else { alert("资金不足"); }
        } else { // 卖出
            let sellAmt = Math.abs(amt);
            if (s.hold >= sellAmt) {
                let gain = s.price * sellAmt;
                balance += gain;
                s.cost = s.cost * ( (s.hold - sellAmt) / s.hold ); // 按比例减持成本
                s.hold -= sellAmt;
            } else { alert("持仓不足"); }
        }
        renderGrid();
    }

    function getNews() {
        const s = stocks[Math.floor(Math.random()*stocks.length)];
        activeNews = { name: s.name, effect: 0.15 };
        document.getElementById('newsBox').style.display = 'block';
        document.getElementById('newsContent').innerText = `${s.name}获得巨额政府订单，预计波动上涨！`;
    }

    async function simulateDay() {
        stocks.forEach(s => {
            let rnd = (Math.random()*0.2 - 0.1);
            if(activeNews && s.name === activeNews.name) rnd += activeNews.effect;
            s.price = Math.max(1, s.price * (1+rnd));
        });
        if(db && playerName) { await db.ref('users/' + playerName).update({ balance: balance }); }
        activeNews = null;
        document.getElementById('newsBox').style.display = 'none';
        renderGrid();
        alert("市场已结算，数据已同步！");
    }

    function updateRanks() {
        db.ref('users').orderByChild('balance').limitToLast(8).on('value', (snap) => {
            let list = [];
            snap.forEach(c => { list.push({n: c.key, b: c.val().balance}); });
            list.sort((a,b) => b.b - a.b);
            let h = "";
            list.forEach((u,i) => {
                h += `<div class="rank-item">
                    <span>${i+1}. ${u.n}</span>
                    <span style="color:var(--yellow)">¥${u.b.toLocaleString()}</span>
                </div>`;
            });
            document.getElementById('rankList').innerHTML = h;
        });
    }
</script>
</body>
</html>
