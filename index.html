<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAIXIANG666 | 终极联机操盘终端</title>
    
    <!-- 核心库：Firebase + Chart.js -->
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #020617;
            --card: rgba(30, 41, 59, 0.7);
            --yellow: #fbbf24;
            --up: #ff4d4d;
            --down: #00e676;
            --text: #f8fafc;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
            color: var(--text);
            margin: 0;
            padding: 15px;
            min-height: 100vh;
        }

        /* 登录界面 - 赛博风格 */
        #loginBox {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.98);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .login-card {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--yellow);
            width: 320px;
            box-shadow: 0 0 40px rgba(251, 191, 36, 0.2);
            text-align: center;
        }

        input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
            color: white;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--yellow); box-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }

        .btn-main {
            background: var(--yellow);
            color: #000;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn-main:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--yellow); }
        .btn-main:disabled { background: #475569; cursor: not-allowed; }

        /* 主界面布局 */
        .container { max-width: 800px; margin: 0 auto; }
        
        .header {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .balance-val { color: var(--yellow); font-size: 28px; font-weight: 800; text-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }

        table {
            width: 100%;
            background: var(--card);
            border-collapse: separate;
            border-spacing: 0 8px;
            margin-bottom: 20px;
        }

        th { padding: 12px; color: #94a3b8; font-size: 12px; text-transform: uppercase; }
        td { background: rgba(255,255,255,0.03); padding: 16px; border: none; }
        td:first-child { border-radius: 12px 0 0 12px; }
        td:last-child { border-radius: 0 12px 12px 0; }

        .up { color: var(--up); font-weight: bold; }
        .down { color: var(--down); font-weight: bold; }

        /* 走势图容器 */
        #chartContainer {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--glass);
            margin-bottom: 20px;
            display: none;
        }

        .rank-box {
            background: rgba(30, 41, 59, 0.5);
            padding: 20px;
            border-radius: 20px;
            border-left: 4px solid var(--yellow);
        }

        .news-flash {
            background: #fef3c7;
            color: #92400e;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-weight: bold;
            display: none;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div id="loginBox">
    <div class="login-card">
        <h1 style="color: var(--yellow); margin: 0 0 10px 0; font-size: 24px;">TERMINAL v2.0</h1>
        <p style="color: #94a3b8; margin-bottom: 30px;">请输入授权凭证进入系统</p>
        <input type="text" id="pName" placeholder="操盘手代号">
        <input type="password" id="pPwd" placeholder="4位数字密码">
        <button id="loginBtn" class="btn-main" onclick="doLogin()">连接卫星网络</button>
        <p id="netStatus" style="font-size: 12px; color: #64748b; margin-top: 20px;">📡 正在扫描 Firebase 节点...</p>
    </div>
</div>

<div id="gameUI" class="container" style="display:none">
    <div class="header">
        <div style="text-align: left;">
            <div style="font-size: 12px; color: #94a3b8;">可用流动资金 (CNY)</div>
            <div id="balanceDisplay" class="balance-val">¥100,000.00</div>
        </div>
        <button onclick="getNews()" style="background: #6366f1; color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: bold;">获取内幕</button>
    </div>

    <div id="newsBox" class="news-flash">📢 <span id="newsContent"></span></div>

    <table>
        <thead><tr><th>标的名称</th><th>现价</th><th>涨跌幅</th><th>持仓</th><th>操作</th></tr></thead>
        <tbody id="stockBody"></tbody>
    </table>

    <div id="chartContainer">
        <canvas id="myChart"></canvas>
    </div>

    <button onclick="simulateDay()" style="width:100%; padding:20px; background:linear-gradient(90deg, #f59e0b, #d97706); color:white; border:none; border-radius:15px; font-size:18px; margin-bottom:30px; cursor:pointer; font-weight:800;">结束今日交易并同步</button>

    <div class="rank-box">
        <h3 style="color: var(--yellow); margin-top: 0;">🏆 全球操盘手排行榜</h3>
        <div id="rankList">同步中...</div>
    </div>
</div>

<script>
    // ✅ 已修复：正确的 Firebase 链接与库加载
    const firebaseConfig = {
      apiKey: "AIzaSyAOCLu6X1gbrYzHLx_HlhJrtXQ_ftSddcQ",
      authDomain: "caixiang666-stock.firebaseapp.com",
      databaseURL: "https://caixiang666-stock-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "caixiang666-stock",
      storageBucket: "caixiang666-stock.firebasestorage.app",
      appId: "1:504203288950:web:2f93e0c6a2dde37f095a57"
    };

    let db, balance = 100000, playerName = "", stocks = [], chartObj = null, activeNews = null;

    function initFirebase() {
        if (typeof firebase !== 'undefined') {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            document.getElementById('netStatus').innerText = "✅ 卫星连接就绪";
            document.getElementById('netStatus').style.color = "#22c55e";
        } else {
            setTimeout(initFirebase, 500);
        }
    }
    initFirebase();

    async function doLogin() {
        if (!db) return alert("系统未就绪！");
        const name = document.getElementById('pName').value.trim();
        const pwd = document.getElementById('pPwd').value;
        if(!name || !pwd) return alert("凭证缺失！");

        const btn = document.getElementById('loginBtn');
        btn.disabled = true; btn.innerText = "正在验证...";

        try {
            const snap = await db.ref('users/' + name).once('value');
            const data = snap.val();
            if (!data) {
                await db.ref('users/' + name).set({ password: pwd, balance: 100000 });
                balance = 100000;
            } else if (data.password !== pwd) {
                btn.disabled = false; btn.innerText = "验证失败";
                return alert("密码错误！");
            } else {
                balance = data.balance;
            }
            playerName = name;
            document.getElementById('loginBox').style.display='none';
            document.getElementById('gameUI').style.display='block';
            initStocks(); updateRanks();
        } catch (e) {
            alert("请检查 Firebase 数据库权限（Rules）是否已设为 true！");
            btn.disabled = false; btn.innerText = "重试";
        }
    }

    function initStocks() {
        const names = ['量子计算','星链通讯','火星矿业','生物基因','脑机接口'];
        stocks = names.map(n => {
            let p = parseFloat((Math.random()*150+50).toFixed(2));
            return { name: n, price: p, hold: 0, history: [p, p-2, p+1] };
        });
        renderTable();
    }

    function renderTable() {
        const body = document.getElementById('stockBody'); 
        body.innerHTML = '';
        stocks.forEach((s, i) => {
            let chg = ((s.price - s.history[s.history.length-2])/s.history[s.history.length-2]*100).toFixed(2);
            body.innerHTML += `<tr>
                <td style="font-weight:bold">${s.name}</td>
                <td style="font-family:monospace">¥${s.price.toFixed(2)}</td>
                <td class="${chg>=0?'up':'down'}">${chg>=0?'+':''}${chg}%</td>
                <td>${s.hold}</td>
                <td>
                    <button onclick="buy(${i})" style="color:var(--up); background:none; border:1px solid var(--up); padding:4px 8px; border-radius:4px; cursor:pointer">买入</button>
                    <button onclick="showChart(${i})" style="margin-left:5px; background:none; border:1px solid #64748b; color:#64748b; padding:4px 8px; border-radius:4px; cursor:pointer">图表</button>
                </td>
            </tr>`;
        });
        document.getElementById('balanceDisplay').innerText = `¥${balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
    }

    function buy(idx) {
        let cost = stocks[idx].price * 100;
        if(balance >= cost) {
            balance -= cost;
            stocks[idx].hold += 100;
            renderTable();
        } else {
            alert("资金不足以支付一手 (100股)！");
        }
    }

    function getNews() {
        const target = stocks[Math.floor(Math.random()*stocks.length)];
        activeNews = { name: target.name, boost: (Math.random()*0.2).toFixed(2) };
        document.getElementById('newsBox').style.display = 'block';
        document.getElementById('newsContent').innerText = `${target.name}板块受到重大利好刺激，预计涨幅 ${activeNews.boost*100}%！`;
    }

    function showChart(idx) {
        document.getElementById('chartContainer').style.display = 'block';
        const ctx = document.getElementById('myChart').getContext('2d');
        if(chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels: stocks[idx].history.map((_,i)=>i+1),
                datasets: [{
                    label: stocks[idx].name,
                    data: stocks[idx].history,
                    borderColor: '#fbbf24',
                    tension: 0.3,
                    fill: true,
                    backgroundColor: 'rgba(251, 191, 36, 0.1)'
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#1e293b' } } } }
        });
    }

    async function simulateDay() {
        stocks.forEach(s => {
            let rnd = (Math.random()*0.16 - 0.08); // 基础波动 -8% ~ +8%
            if(activeNews && s.name === activeNews.name) rnd += parseFloat(activeNews.boost);
            s.price = parseFloat((s.price * (1 + rnd)).toFixed(2));
            s.history.push(s.price);
        });
        if(db && playerName) {
            await db.ref('users/' + playerName).update({ balance: balance });
        }
        activeNews = null;
        document.getElementById('newsBox').style.display = 'none';
        renderTable();
        alert("今日交易已结算，数据已同步至卫星云端！");
    }

    function updateRanks() {
        db.ref('users').orderByChild('balance').limitToLast(10).on('value', (snap) => {
            let list = [];
            snap.forEach(c => { list.push({n: c.key, b: c.val().balance}); });
            list.sort((a,b) => b.b - a.b);
            let h = "<table style='width:100%; background:transparent'><tr><th>名次</th><th>操盘手</th><th>总资产</th></tr>";
            list.forEach((u,i) => {
                h += `<tr><td>${i+1}</td><td>${u.n}</td><td style="color:var(--yellow)">¥${u.b.toLocaleString()}</td></tr>`;
            });
            document.getElementById('rankList').innerHTML = h + "</table>";
        });
    }
</script>
</body>
</html>
